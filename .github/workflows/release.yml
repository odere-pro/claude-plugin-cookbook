name: release

# A "release" for this plugin is a git tag + a GitHub Release. Marketplace consumers track the
# repo and update by re-pulling the tagged commit; there is no package-registry publish step.
# The version of record is .claude-plugin/plugin.json -> version; see docs/RELEASING.md and
# docs/cookbook/14-supply-chain-and-governance.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches plugin.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(jq -r '.version' .claude-plugin/plugin.json)"
          echo "tag=$tag  plugin.json=$manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v$tag does not match plugin.json version $manifest"
            exit 1
          fi

      - name: Run gate suite
        run: bash tests/gates/run-all.sh

      - name: Extract changelog section
        id: notes
        run: |
          ver="$(jq -r '.version' .claude-plugin/plugin.json)"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          echo "wrote $(wc -l < release-notes.md) lines"

      - name: Package release tarball
        id: hash
        run: |
          tarball="claude-plugin-cookbook-${GITHUB_REF_NAME}.tar.gz"
          git archive --format=tar.gz \
            --prefix="claude-plugin-cookbook-${GITHUB_REF_NAME#v}/" \
            -o "$tarball" HEAD
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          # base64 of `sha256sum <artifact>` — the subject format the SLSA generator expects
          echo "hashes=$(sha256sum "$tarball" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "${{ steps.hash.outputs.tarball }}"

  # Generates SLSA build provenance for the release tarball and attaches the *.intoto.jsonl
  # provenance as a release asset. Pinned to a semantic-version tag by design — the SLSA
  # reusable workflow self-verifies and refuses commit-SHA refs.
  provenance:
    needs: [release]
    permissions:
      actions: read # read the workflow run for provenance
      id-token: write # keyless signing via OIDC
      contents: write # upload provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
