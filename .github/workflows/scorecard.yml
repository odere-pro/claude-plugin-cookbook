name: scorecard

# OpenSSF Scorecard analysis. Backs the "OpenSSF Scorecard" badge in README.md —
# publish_results: true uploads the score to the public Scorecard API so the badge renders.
# The badge only populates after the first run on the default branch (repo must be public).
# Teaches docs/cookbook/14-supply-chain-and-governance.md.

on:
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC
  push:
    branches: ["main"]
  branch_protection_rule:

permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish results to the public Scorecard API
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
