name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # shellcheck and jq ship on ubuntu-latest; the claude CLI does not, so the
      # validate gate self-skips. Everything else runs.
      - name: Run gates
        run: bash tests/gates/run-all.sh
