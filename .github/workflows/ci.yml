name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives the changelog-fragment gate a merge base to diff against.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # shellcheck and jq ship on ubuntu-latest; the claude CLI does not, so the
      # validate gate self-skips. Everything else runs.
      - name: Run gates
        run: bash tests/gates/run-all.sh
